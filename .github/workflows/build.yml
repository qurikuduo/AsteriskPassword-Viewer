name: Build Windows

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution
        shell: pwsh
        run: msbuild Asterisk-Password.sln /m /p:Configuration=Release /p:Platform=Win32

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: AsteriskPassword-Release-Win32
          path: Asterisk/Release/AsteriskPassword.exe
          if-no-files-found: error